<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a4d"/>
      <stop offset="100%" stop-color="#002366"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#ed1c24" stroke-width="3"/>

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Red square with H -->
  <rect x="68" y="55" width="64" height="64" rx="6" fill="#ed1c24"/>
  <text x="100" y="102" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">H</text>

  <!-- Company name -->
  <text x="100" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    HEDGE RESOURCE
  </text>
  <text x="100" y="164" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    CENTRE
  </text>

  <!-- Red dot at bottom -->
  <circle cx="100" cy="178" r="3" fill="#ed1c24"/>

  <!-- Decorative dots on ring -->
  <circle cx="100" cy="8" r="3" fill="#ed1c24"/>
  <circle cx="100" cy="192" r="2" fill="#ffffff" opacity="0.3"/>
</svg>
